    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaithBot</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- FaithBot now runs on its own site (self-hosted engine, 50+ languages). We open it directly
         rather than in an iframe so it runs first-party: chat, Cloudflare Turnstile, and Google
         sign-in all work with no cross-site cookie problems. (An embedded version via a same-site
         subdomain is a later enhancement.) location.replace keeps it out of history so Back returns
         to the site, not a redirect loop. -->
    <link rel="canonical" href="https://faithbot.donbarger.com/">
    <meta http-equiv="refresh" content="0; url=https://faithbot.donbarger.com/">
    <script>window.location.replace('https://faithbot.donbarger.com/');</script>

    <style>
        html, body { height: 100%; margin: 0; }
        body {
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #1B365D; background: #f7f9fc; text-align: center; padding: 2rem;
        }
        a { color: #1B365D; font-weight: 600; }
    </style>
</head>
<body>
    <p>Opening FaithBot… If it doesn’t load,
       <a href="https://faithbot.donbarger.com/">continue to FaithBot</a>.</p>
